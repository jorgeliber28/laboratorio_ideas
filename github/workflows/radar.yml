name: Radar semanal

on:
  schedule:
    - cron: "0 14 * * 1"   # cada lunes 14:00 UTC ≈ 8:00 a.m. en CDMX
  workflow_dispatch:        # permite correrlo a mano con un botón

permissions:
  contents: write           # para que el robot pueda guardar ideas.json

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar ideas con Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ideas.json
          git commit -m "Radar: ideas de la semana" || echo "Sin cambios"
          git push
